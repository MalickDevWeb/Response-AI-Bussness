version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    depends_on:
      - evolution-db
      - redis
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://VOTRE_IP_EC2_PUBLIQUE:8080
      - DOCKER_ENV=true
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=AutocloserSecretKey2026
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:super_password_123@evolution-db:5432/evolution?schema=public
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://autocloser-redis:6379/6
      - CACHE_LOCAL_ENABLED=false
      - QRCODE_LIMIT=30
      - WA_BROWSER_NAME=Mac OS
      - WA_BROWSER_VERSION=10.15.7
    restart: unless-stopped

  evolution-db:
    image: ankane/pgvector:latest
    container_name: evolution-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=super_password_123
      - POSTGRES_DB=evolution
    ports:
      - "5432:5432"
    volumes:
      - autocloser_evolution_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: autocloser-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  autocloser_evolution_pgdata:
  autocloser_evolution_instances:
