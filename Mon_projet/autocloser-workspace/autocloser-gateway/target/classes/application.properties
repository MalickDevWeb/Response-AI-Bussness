# ============================================================
# AUTOCLOSER AI - Configuration Spring Boot (Mois 1)
# ============================================================

spring.application.name=autocloser-gateway
server.port=3000

# --- Base de données PostgreSQL (Docker local) ---
spring.datasource.url=jdbc:postgresql://localhost:5435/autocloser
spring.datasource.username=postgres
spring.datasource.password=super_password_123
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway (gestion des migrations SQL) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Redis ---
spring.data.redis.host=localhost
spring.data.redis.port=6379

# --- Logs ---
logging.level.sn.autocloser=DEBUG
logging.level.org.springframework.web=INFO

# ============================================================
# MOIS 2 - IA Locale (Ollama via LangChain4j)
# ============================================================

# Modèle de chat (Llama 3.2:3b si RAM < 8GB, sinon llama3:8b)
autocloser.ollama.base-url=http://localhost:11434
autocloser.ollama.chat-model=phi3:latest
autocloser.ollama.embed-model=phi3:latest
autocloser.ollama.timeout=120s
autocloser.ollama.temperature=0.3

# ============================================================
# MOIS 4 - Messagerie (Evolution API)
# ============================================================
autocloser.evolution-api.base-url=http://localhost:8081
autocloser.evolution-api.global-apikey=AutocloserSecretKey2026
# L'URL où Evolution API enverra les messages (adapter si Docker = host.docker.internal)
autocloser.webhook.url=http://host.docker.internal:3000/api/v1/webhook/message
