<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCloser AI - Lier WhatsApp</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
        }
        h1 { margin-top: 0; font-size: 24px; color: #38bdf8; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.5; }
        .qr-placeholder {
            width: 250px;
            height: 250px;
            background-color: white;
            border-radius: 12px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        img { max-width: 100%; max-height: 100%; border-radius: 8px; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button {
            background: linear-gradient(135deg, #38bdf8, #2563eb);
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="card">
        <h1>Liaison WhatsApp</h1>
        <p>Générez le QR Code pour lier votre numéro réel <b>+221771719013</b> à l'IA AutoCloser.</p>
        
        <div class="qr-placeholder" id="qrContainer">
            <!-- QR code goes here -->
        </div>

        <button onclick="genererQR()">Générer le QR Code</button>
        <p id="statusMsg" style="margin-top: 20px; font-weight: bold; color: #fbbf24;"></p>
    </div>

    <script>
        const apiKey = "AutocloserSecretKey2026";
        const evoApiUrl = "http://localhost:8081";
        const instanceName = "boutiquepmt"; // Nom de l'instance liée à 771719013

        async function genererQR() {
            const qrContainer = document.getElementById('qrContainer');
            const statusMsg = document.getElementById('statusMsg');
            
            qrContainer.innerHTML = '<div class="loader"></div>';
            statusMsg.innerText = "Création de l'instance en cours...";

            try {
                // 1. Créer l'instance
                await fetch(`${evoApiUrl}/instance/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': apiKey },
                    body: JSON.stringify({ instanceName: instanceName, integration: "WHATSAPP-BAILEYS", qrcode: true })
                });

                statusMsg.innerText = "Génération du QR Code...";

                // 2. Récupérer le QR
                let qrBase64 = null;
                for(let i=0; i<5; i++) {
                    const res = await fetch(`${evoApiUrl}/instance/connect/${instanceName}`, {
                        headers: { 'apikey': apiKey }
                    });
                    const data = await res.json();
                    
                    if (data.base64) { qrBase64 = data.base64; break; }
                    else if (data.qrcode && data.qrcode.base64) { qrBase64 = data.qrcode.base64; break; }
                    
                    await new Promise(r => setTimeout(r, 2000)); // wait 2s
                }

                if (qrBase64) {
                    qrContainer.innerHTML = `<img src="${qrBase64}" alt="QR Code">`;
                    statusMsg.innerText = "✅ Scannez ce QR Code avec votre téléphone !";
                    statusMsg.style.color = "#4ade80";
                } else {
                    qrContainer.innerHTML = '❌';
                    statusMsg.innerText = "Échec de génération. L'instance est peut-être déjà connectée ou bloquée.";
                    statusMsg.style.color = "#f87171";
                }

            } catch (error) {
                qrContainer.innerHTML = '❌';
                statusMsg.innerText = "Erreur de connexion à Evolution API (est-il démarré sur le port 8081 ?)";
                statusMsg.style.color = "#f87171";
            }
        }
    </script>
</body>
</html>
