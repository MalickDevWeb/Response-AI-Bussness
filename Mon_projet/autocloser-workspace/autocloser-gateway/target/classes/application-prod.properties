# ──────────────────────────────────────────────────────
# PROFIL PRODUCTION — application-prod.properties
# Ce fichier est utilisé quand SPRING_PROFILES_ACTIVE=prod
# ──────────────────────────────────────────────────────

server.port=3000

# ── Base de données PostgreSQL (variables injectées par Docker sur EC2) ──
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://autocloser-db:5432/autocloser}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:super_password_123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true

# ── IA Ollama ──
spring.ai.ollama.base-url=${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=qwen2.5-coder:1.5b
spring.ai.ollama.embedding.model=qwen2.5-coder:1.5b

# ── Evolution API WhatsApp ──
autocloser.evolution-api.base-url=${AUTOCLOSER_EVOLUTION_API_BASE_URL:http://evolution-api:8080}
autocloser.evolution-api.global-apikey=${AUTOCLOSER_EVOLUTION_API_GLOBAL_APIKEY:AutocloserSecretKey2026}

# ── Logging (moins verbeux en production) ──
logging.level.root=WARN
logging.level.sn.autocloser=INFO
